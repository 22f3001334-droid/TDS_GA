name: Daily Automated Commit

on:
  schedule:
    - cron: '17 3 * * *'   # Runs daily at 03:17 UTC (fixed time, no wildcards)
  workflow_dispatch:        # Allows manual trigger

jobs:
  daily-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Git
        run: |
          git config user.name "DevSync Bot"
          git config user.email "22f3001334@ds.study.iitm.ac.in"

      - name: Update timestamp file - 22f3001334@ds.study.iitm.ac.in
        run: |
          echo "Last update: $(date -u)" >> daily-log.txt

      - name: Commit changes
        run: |
          git add daily-log.txt
          git commit -m "Automated daily commit $(date -u)" || echo "No changes to commit"

      - name: Push changes
        run: git push
